version: "3.9"

services:

  app:
    build: .
    container_name: taxacademy-app

    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    depends_on:
      - postgres

  nginx:
    image: nginx:latest
    container_name: taxacademy-nginx
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  postgres:
    image: postgres:16
    container_name: taxacademy-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: taxacademy
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: