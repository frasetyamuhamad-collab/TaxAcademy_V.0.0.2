version: "3.9"

services:

  app:
    build: .
    container_name: taxacademy-app

    restart: unless-stopped

    working_dir: /var/www

    volumes:
      - .:/var/www

    depends_on:
      - postgres

  nginx:
    image: nginx:latest

    container_name: taxacademy-nginx

    restart: unless-stopped

    ports:
      - "8080:80"

    volumes:
      - .:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - app

  postgres:
    image: postgres:16

    container_name: taxacademy-db

    restart: unless-stopped

    environment:
      POSTGRES_DB: taxacademy
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: